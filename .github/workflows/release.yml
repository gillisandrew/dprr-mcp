name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7

      - name: Run tests
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run pytest -q

      - name: Build package
        run: uv build

      - name: Create data tarball
        run: tar -czf dprr-data.tar.gz -C data dprr.ttl

      - name: Build release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ github.ref_name }}" \
            --jq '.body' > /tmp/release-notes.md
          cat >> /tmp/release-notes.md <<'EOF'

          ---

          **Data License:** The included DPRR dataset (`dprr-data.tar.gz`) is © John Bradley, King's College London, licensed under [CC BY-NC 4.0](https://creativecommons.org/licenses/by-nc/4.0/). See the [DPRR project](https://romanrepublic.ac.uk/) for details.
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/*.tar.gz \
            dist/*.whl \
            dprr-data.tar.gz \
            --notes-file /tmp/release-notes.md
